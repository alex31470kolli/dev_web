<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Publication d'une offre de stage" />
  <title>Publier une offre</title>
  <link rel="stylesheet" href="assets/css/publier-offre.css" />
</head>
<body>
  <header class="barre-haut">
    <div class="zone-logo">
      <img src="CYTech.jpg" alt="Logo de l'école" class="logo-ecole" />
      <div>
        <h1>Publication d'une offre</h1>
        <p class="sous-titre">Créer une nouvelle offre de stage</p>
      </div>
    </div>

    <nav class="actions-haut">
      <a href="entreprise.html" class="bouton-navigation">Accueil entreprise</a>
      <a href="connexion-entreprise.html" class="bouton-navigation">Se connecter</a>
    </nav>
  </header>

  <main class="conteneur-principal">
    <section class="zone-formulaire-offre">
      <h2>Déposer une offre de stage</h2>

      <form id="formulaire-offre" class="formulaire-offre">
        <div class="grille-formulaire-offre">
          <div class="groupe-filtre">
            <label for="titre-offre">Titre de l'offre</label>
            <input type="text" id="titre-offre" placeholder="Ex : Stage Développeur Web" required />
          </div>

          <div class="groupe-filtre">
            <label for="nom-entreprise">Nom de l'entreprise</label>
            <input type="text" id="nom-entreprise" placeholder="Ex : TechNova" required />
          </div>

          <div class="groupe-filtre">
            <label for="duree-offre">Durée</label>
            <select id="duree-offre" required>
              <option value="">Choisir une durée</option>
              <option value="2 mois">2 mois</option>
              <option value="3 mois">3 mois</option>
              <option value="4 mois">4 mois</option>
              <option value="6 mois">6 mois</option>
            </select>
          </div>

          <div class="groupe-filtre">
            <label for="domaine-offre">Domaine</label>
            <select id="domaine-offre" required>
              <option value="">Choisir un domaine</option>
              <option value="Développement web">Développement web</option>
              <option value="Cybersécurité">Cybersécurité</option>
              <option value="Data">Data</option>
              <option value="Réseaux">Réseaux</option>
              <option value="IA">IA</option>
            </select>
          </div>

          <div class="groupe-filtre">
            <label for="lieu-offre">Lieu</label>
            <select id="lieu-offre" required>
              <option value="">Choisir un lieu</option>
              <option value="Paris">Paris</option>
              <option value="Lyon">Lyon</option>
              <option value="Toulouse">Toulouse</option>
              <option value="Distanciel">Distanciel</option>
              <option value="Autre">Autre</option>
            </select>
          </div>

          <div class="groupe-filtre">
            <label for="competences-offre">Compétences recherchées</label>
            <input type="text" id="competences-offre" placeholder="Ex : HTML, CSS, JavaScript" required />
          </div>
        </div>

        <div class="groupe-zone-texte">
          <label for="description-offre">Description de l'offre</label>
          <textarea id="description-offre" rows="6" placeholder="Décrivez les missions, le profil recherché, les outils..." required></textarea>
        </div>

        <div class="zone-boutons-filtres">
          <button type="submit" class="bouton-principal">Publier l'offre</button>
          <button type="reset" class="bouton-secondaire">Effacer</button>
        </div>

        <p id="message-publication" class="message-succes"></p>
      </form>
    </section>
  </main>

  <footer class="pied-page">
    <p>© 2026 - Plateforme de suivi et d’archivage des stages</p>
  </footer>

  <script src="assets/js/publier-offre.js"></script>
</body>
</html>
