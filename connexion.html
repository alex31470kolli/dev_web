<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <title>CY TECH stages - Connexion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light"> <div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card shadow-lg p-4" style="width: 100%; max-width: 400px;">
        <div class="text-center mb-4">
            <h2 class="text-primary">CY TECH Stages</h2>
            <p class="text-muted">Connectez-vous à votre espace</p>
        </div>

        <form id="form-connexion" name="form-connexion">
            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" name="email" required placeholder="nom@cytech.fr">
            </div>

            <div class="mb-3">
                <label for="motdepasse" class="form-label">Mot de passe</label>
                <input type="password" class="form-control" id="motdepasse" name="motdepasse" required>
            </div>

            <button type="submit" class="btn btn-primary w-100 mb-3">Me connecter</button>
            
            <div class="text-center">
                <a href="inscription.php" class="text-decoration-none">Je n'ai pas encore de compte</a>
            </div>
        </form>
    </div>
</div>

<script>

    document.getElementById('form-connexion').addEventListener('submit', async (e) => {
        e.preventDefault(); 
        const formData = new FormData(e.target);
        try {
            const response = await fetch('traitement_connexion.php', { method: 'POST', body: formData });
            const result = await response.json();
            if (result.success) {
                if (result.requires_2fa) window.location.href = "verification_a2f.php";
            } else {
                alert("Erreur : " + result.message);
            }
        } catch (error) {
            alert("Impossible de contacter le serveur.");
        }
    });
</script>
</body>
</html>
