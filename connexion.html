<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <title>CY TECH stages - Connexion</title>
    <link rel="stylesheet" href="/assets/css/css_all.css">  
</head>
<body>

    <h1>Bienvenue sur le site de stages de CY TECH</h1>

    <p><b>Connectez-vous !</b></p>
    
    <form id="form-connexion" name="form-connexion">
        <label for="email">Email</label> 
        <input type="email" id="email" name="email" required> <br><br>

        <label for="motdepasse">Mot de passe</label> 
        <input type="password" id="motdepasse" name="motdepasse" required>
        <br><br>

        <input type="submit" value="Me connecter">
    </form>

    <br>
    <a href="inscription.php">Je n'ai pas de compte</a>

    <script>
    document.getElementById('form-connexion').addEventListener('submit', async (e) => {
        e.preventDefault(); // Empêche le rechargement de la page

        const formData = new FormData(e.target);
        
        try {
            const response = await fetch('traitement_connexion.php', {
                method: 'POST',
                body: formData
            });

            // On vérifie si la réponse est bien du JSON
            const result = await response.json();

            if (result.success) {
                if (result.requires_2fa) {
                    window.location.href = "verification_a2f.php";
                }
            }   else {
                alert("Erreur : " + result.message);
            }
        } catch (error) {
            console.error("Erreur technique :", error);
            alert("Impossible de contacter le serveur.");
        }
    });
    </script>

</body>
</html>
