<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8" />
        <title>CY TECH stages - connexion</title> 
    </head>

    <body>

        <h1> Bienvenue sur le site de stages de CY TECH </h1>

        <p> <b> Créez un compte !</b></p>
        <form id="form-inscription" name="form-inscription">


            <label>Nom </label> <input type="text" id="nom" name="nom"> <br>
            <label>Prenom </label> <input type="text" id="prenom" name="prenom"> <br>
            <label>Email</label> <input type="text" id="email" name="email"> <br>
            <label>Mot de passe</label> <input type="password" id="motdepasse" name="motdepasse"> <br>
            <label>Choix du groupe</label> <br>
            <input type="radio" id="etudiant" name="role" value="Etudiant">
            <label for="etudiant">Étudiant</label><br>
            <input type="radio" id="entreprise" name="role" value="Entreprise">
            <label for="Entreprise">Entreprise</label><br>
            <input type="radio" id="admin" name="role" value="Administrateur">
            <label for="admin">Administrateur</label>

            <br>
            <input type="submit" value="M'inscrire">

        </form>


        <script>
            document.getElementById('form-inscription').addEventListener('submit', async (e) => {
                e.preventDefault(); // Empêche la page de se recharger

                // On récupère les données du formulaire
                const formData = new FormData(e.target);

                // On envoie les données au fichier PHP de traitement
                const response = await fetch('traitement_inscription.php', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (result.success) {
                    alert("Compte créé avec succès !");
                    window.location.href = "connexion.html"; // Redirection
                } else {
                    alert("Erreur : " + result.message);
                }
            });
        </script>
    </body>

</html>
